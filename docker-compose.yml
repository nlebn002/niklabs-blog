services:
  api:
    build:
      context: .
      dockerfile: deploy/api.Dockerfile
    depends_on:
      - postgres
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__blogdb: Host=postgres;Port=${POSTGRES_PORT};Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Admin__ApiKey: ${ADMIN_API_KEY}
      Storage__UploadsPath: /app/uploads
      Storage__PublicBasePath: /uploads
    ports:
      - "8080:8080"
    volumes:
      - blog-uploads:/app/uploads

  web:
    build:
      context: .
      dockerfile: deploy/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: ${API_BASE_URL}
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  blog-uploads:
